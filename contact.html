        .nav-soft { background: #ffffffdd; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 99; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; padding: 16px 0; }
        .logo-green { font-size: 1.5rem; font-weight: 700; color: #3A6B3D; }
        .logo-green span { color: #E67E22; }
        .nav-links-green { display: flex; gap: 2rem; flex-wrap: wrap; list-style: none; margin-left: auto; }
        .nav-links-green li a { text-decoration: none; color: #2C3E2F; font-weight: 500; font-size: 1rem; transition: color 0.2s; }
        .nav-links-green li a:hover, .nav-links-green li a.active { color: #E67E22; }
        @media (max-width: 680px) { .nav-flex { flex-direction: column; gap: 12px; } .nav-links-green { margin-left: 0; justify-content: center; gap: 1.2rem; } }

        .title-green { font-size: 2rem; font-weight: 700; color: #2C5A2E; margin-bottom: 16px; text-align: center; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; }
        .contact-info, .contact-form { background: white; border-radius: 32px; padding: 32px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .contact-info p { margin: 16px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 12px; }
        .contact-info a { color: #2C3E2F; text-decoration: none; border-bottom: 1px solid #E67E22; }
        .contact-info a:hover { color: #E67E22; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #e0d6c8; border-radius: 28px; font-family: inherit; }
        .contact-form textarea { border-radius: 24px; resize: vertical; }
        .map-placeholder { background: #D9E3CC; border-radius: 32px; padding: 40px 20px; text-align: center; margin-top: 40px; }
        .map-link { display: inline-block; background: #E67E22; color: white; text-decoration: none; padding: 12px 28px; border-radius: 50px; font-weight: 600; margin-top: 20px; transition: background 0.2s; }

        footer { background: #2C5A2E; color: #f0f2e9; padding: 24px 0; text-align: center; font-size: 0.9rem; }
        @media (max-width: 700px) { .title-green { font-size: 1.7rem; } .contact-grid { grid-template-columns: 1fr; } }
